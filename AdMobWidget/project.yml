name: AdMobWidget
options:
  deploymentTarget:
    macOS: "14.0"
  bundleIdPrefix: com.admobwidget
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.38"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEVELOPMENT_TEAM: V7W7R932PY
    CODE_SIGN_STYLE: Automatic

targets:
  AdMobWidget:
    type: application
    platform: macOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.admobwidget.app
        INFOPLIST_FILE: Sources/App/Info.plist
        PRODUCT_NAME: AdMob Widget
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: true
        LSUIElement: true
    entitlements:
      path: Sources/App/AdMobWidget.entitlements
      properties:
        com.apple.security.network.client: true
